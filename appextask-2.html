<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate HTML CSS JavaScript Project</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            color:#333;
        }

        /* Navbar */

        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:teal;
            padding:15px 30px;
            flex-wrap:wrap;
        }

        .navbar h1{
            color:white;
        }

        .navbar ul{
            display:flex;
            list-style:none;
            gap:20px;
        }

        .navbar ul li a{
            color:white;
            text-decoration:none;
            font-size:18px;
        }

        /* Contact Form */

        .container{
            width:90%;
            max-width:500px;
            margin:40px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        .container h2{
            text-align:center;
            margin-bottom:20px;
            color:teal;
        }

        input, textarea{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:teal;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:darkcyan;
        }

        /* Responsive Grid */

        .grid-container{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
            padding:30px;
        }

        .box{
            background:white;
            padding:40px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 0 8px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        .box:hover{
            transform:scale(1.05);
        }

        /* To-Do List */

        .todo-section{
            width:90%;
            max-width:500px;
            margin:30px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        .todo-section h2{
            text-align:center;
            color:teal;
            margin-bottom:20px;
        }

        .todo-input{
            display:flex;
            gap:10px;
        }

        .todo-input input{
            flex:1;
        }

        ul{
            margin-top:20px;
        }

        li{
            list-style:none;
            background:#eee;
            margin-top:10px;
            padding:10px;
            border-radius:5px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .delete-btn{
            background:red;
            border:none;
            color:white;
            padding:6px 10px;
            border-radius:5px;
            cursor:pointer;
        }

        /* Footer */

        footer{
            background:teal;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:30px;
        }

        /* Responsive */

        @media(max-width:768px){

            .grid-container{
                grid-template-columns:1fr;
            }

            .navbar{
                flex-direction:column;
                gap:10px;
            }

            .navbar ul{
                flex-direction:column;
                align-items:center;
            }

            .todo-input{
                flex-direction:column;
            }
        }

    </style>
</head>

<body>

    <!-- Navbar -->

    <div class="navbar">
        <h1>My Web Project</h1>

        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Form</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Tasks</a></li>
        </ul>
    </div>

    <!-- Contact Form -->

    <div class="container">

        <h2>Contact Form</h2>

        <form onsubmit="return validateForm()">

            <input type="text" id="name" placeholder="Enter Your Name">

            <input type="text" id="email" placeholder="Enter Your Email">

            <textarea rows="5" placeholder="Enter Message"></textarea>

            <button type="submit">Submit</button>

        </form>

    </div>

    <!-- Responsive Grid -->

    <div class="grid-container">

        <div class="box">
            <h2>HTML</h2>
            <p>Structure of webpages</p>
        </div>

        <div class="box">
            <h2>CSS</h2>
            <p>Design and styling</p>
        </div>

        <div class="box">
            <h2>JavaScript</h2>
            <p>Interactive webpages</p>
        </div>

    </div>

    <!-- To-Do List -->

    <div class="todo-section">

        <h2>Dynamic To-Do List</h2>

        <div class="todo-input">

            <input type="text" id="task" placeholder="Enter Task">

            <button onclick="addTask()">Add Task</button>

        </div>

        <ul id="taskList"></ul>

    </div>

    <!-- Footer -->

    <footer>
        <p>© 2026 Intermediate HTML CSS JavaScript Project</p>
    </footer>

    <!-- JavaScript -->

    <script>

        // Form Validation

        function validateForm(){

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;

            if(name === ""){
                alert("Please enter your name");
                return false;
            }

            if(email === ""){
                alert("Please enter your email");
                return false;
            }

            if(!email.includes("@")){
                alert("Please enter valid email");
                return false;
            }

            alert("Form Submitted Successfully!");
            return true;
        }

        // To-Do List

        function addTask(){

            let taskInput = document.getElementById("task");
            let taskValue = taskInput.value;

            if(taskValue === ""){
                alert("Please enter a task");
                return;
            }

            let li = document.createElement("li");

            li.innerHTML = `
                ${taskValue}
                <button class="delete-btn" onclick="deleteTask(this)">Delete</button>
            `;

            document.getElementById("taskList").appendChild(li);

            taskInput.value = "";
        }

        function deleteTask(button){
            button.parentElement.remove();
        }

    </script>

</body>
</html>
